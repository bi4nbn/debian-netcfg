name: Build & Release netcfg Linux amd64
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full code with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须完整拉取tag，否则release插件失效

      - name: Setup Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Compile static linux amd64 binary
        run: |
          # 直接在根目录输出二进制，确保文件存在
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ./netcfg
          # 打印文件确认存在，方便排错
          ls -lh ./netcfg

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ./netcfg # 明确写相对路径
          generate_release_notes: true
          draft: false