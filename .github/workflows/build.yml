name: Build & Release netcfg Linux amd64
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: 完整拉取代码与标签
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: 编译静态Linux amd64二进制
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ./netcfg
          # 校验文件是否生成，失败直接终止流程
          test -f ./netcfg || exit 1
          ls -lh ./netcfg

      - name: 上传二进制至Release（支持覆盖旧版本）
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ./netcfg
          generate_release_notes: true
          overwrite: true  # 关键：允许覆盖同tag旧Release
          fail_on_unmatched_files: true # 文件不存在直接报错，不无限重试